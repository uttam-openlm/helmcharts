name: release-installer

# Publishes the `openlm` installer CLI as a PUBLIC GitHub Release on this repo.
#
# Requirements:
#   - Secret INSTALLER_SRC_TOKEN: a read-only token (fine-grained PAT or deploy
#     key) that can clone uttam-openlm/helmcharts-installer.
#
# Cut a release by pushing a tag on THIS repo, e.g.:
#   git tag installer/v1.2.3 && git push origin installer/v1.2.3
on:
  push:
    tags:
      - "installer/v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helmcharts (holds the tag)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout private installer source into installer/
        uses: actions/checkout@v4
        with:
          repository: uttam-openlm/helmcharts-installer
          token: ${{ secrets.INSTALLER_SRC_TOKEN }}
          path: installer
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: installer/go.sum

      - name: Extract version (strip installer/ prefix from tag)
        id: version
        run: echo "tag=${GITHUB_REF_NAME#installer/}" >> "$GITHUB_OUTPUT"

      - name: Tag installer source HEAD so GoReleaser can resolve the version
        run: git -C installer tag "${{ steps.version.outputs.tag }}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}
